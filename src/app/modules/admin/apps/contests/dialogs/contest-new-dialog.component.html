<div class="flex flex-col" style="max-height: 90vh;">

    <!-- Header -->
    <div class="flex items-center justify-between border-b px-6 py-4 shrink-0">
        <div class="flex items-center gap-3">
            <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-primary/10">
                <mat-icon class="text-primary icon-size-5">emoji_events</mat-icon>
            </div>
            <h2 class="text-base font-bold leading-none">Νέος Διαγωνισμός</h2>
        </div>
        <button mat-icon-button (click)="cancel()">
            <mat-icon class="icon-size-5">close</mat-icon>
        </button>
    </div>

    <!-- Body -->
    <div class="flex-auto overflow-y-auto px-6 py-5">

        @if (error()) {
        <div
            class="mb-4 flex items-center gap-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-800 dark:bg-red-950/40 dark:text-red-300">
            <mat-icon class="shrink-0 text-red-500 icon-size-4">error_outline</mat-icon>
            {{ error() }}
        </div>
        }

        <form [formGroup]="form" class="space-y-4">

            <mat-form-field class="w-full fuse-mat-dense">
                <mat-label>Τίτλος *</mat-label>
                <input matInput formControlName="title" placeholder="π.χ. Μεγάλος Διαγωνισμός Καλοκαιριού" />
            </mat-form-field>

            <mat-form-field class="w-full fuse-mat-dense">
                <mat-label>Περιγραφή</mat-label>
                <textarea matInput rows="3" formControlName="description"
                    placeholder="Σύντομη περιγραφή του διαγωνισμού…"></textarea>
            </mat-form-field>

            <mat-form-field class="w-full fuse-mat-dense">
                <mat-label>URL Εικόνας</mat-label>
                <input matInput formControlName="image" placeholder="https://…" />
            </mat-form-field>

            <div class="grid grid-cols-2 gap-3">

                <mat-form-field class="w-full fuse-mat-dense">
                    <mat-label>Δημοσίευση *</mat-label>
                    <input matInput type="datetime-local" formControlName="publishDate" />
                </mat-form-field>

                <mat-form-field class="w-full fuse-mat-dense">
                    <mat-label>Έναρξη *</mat-label>
                    <input matInput type="datetime-local" formControlName="startDate" />
                </mat-form-field>

                <mat-form-field class="w-full fuse-mat-dense col-span-2">
                    <mat-label>Λήξη *</mat-label>
                    <input matInput type="datetime-local" formControlName="endDate" />
                </mat-form-field>

                <mat-form-field class="w-full fuse-mat-dense">
                    <mat-label>Αριθμός Νικητών</mat-label>
                    <input matInput type="number" min="1" formControlName="totalWinners" />
                </mat-form-field>

                <mat-form-field class="w-full fuse-mat-dense">
                    <mat-label>Μέγ. ανά χρήστη</mat-label>
                    <input matInput type="number" min="1" formControlName="maxEntriesPerUser" />
                </mat-form-field>

                <mat-form-field class="w-full fuse-mat-dense col-span-2">
                    <mat-label>Μέγ. συνολικές συμμετοχές</mat-label>
                    <input matInput type="number" min="1" formControlName="maxTotalEntries" />
                </mat-form-field>

            </div>

            <div
                class="flex items-center justify-between gap-4 rounded-xl border bg-gray-50/80 dark:bg-white/5 px-4 py-3">
                <span class="text-sm font-medium">Ενεργός από την αρχή</span>
                <mat-slide-toggle formControlName="isActive" color="primary"></mat-slide-toggle>
            </div>

            <div
                class="flex items-center justify-between gap-4 rounded-xl border bg-gray-50/80 dark:bg-white/5 px-4 py-3">
                <span class="text-sm font-medium">Ειδοποίηση νικητών</span>
                <mat-slide-toggle formControlName="sendNotificationsToWinners" color="primary"></mat-slide-toggle>
            </div>

        </form>
    </div>

    <!-- Footer -->
    <div class="border-t px-6 py-4 flex items-center justify-end gap-2 shrink-0">
        <button mat-button (click)="cancel()" [disabled]="saving()">Ακύρωση</button>
        <button mat-flat-button color="primary" (click)="save()" [disabled]="saving() || form.invalid"
            class="!rounded-full !font-semibold">
            @if (saving()) { <span class="inline-block animate-spin mr-1">⟳</span> }
            <mat-icon class="mr-1 icon-size-4">add</mat-icon>
            Δημιουργία
        </button>
    </div>

</div>
