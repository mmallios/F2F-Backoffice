<div class="bg-card flex flex-auto flex-col overflow-y-auto dark:bg-default">
    <!-- Header -->
    <div class="flex h-18 flex-0 items-center border-b bg-gray-50 px-6 dark:bg-transparent">
        <button mat-icon-button (click)="drawer.close()">
            <mat-icon [svgIcon]="'heroicons_outline:arrow-long-left'"></mat-icon>
        </button>
        <div class="ml-2 text-2xl font-semibold">Profile</div>
    </div>

    @if (profile) {
        <div class="flex flex-col items-center px-6 py-10">
            <!-- Avatar -->
            <div class="relative flex h-40 w-40 flex-0 rounded-full">
                @if (profile.image) {
                    <img class="h-full w-full rounded-full object-cover" [src]="profile.image" alt="Profile avatar" />
                }
                @if (!profile.image) {
                    <div class="flex h-full w-full items-center justify-center rounded-full bg-gray-200 text-8xl font-semibold uppercase text-gray-600 dark:bg-gray-700 dark:text-gray-200">
                        {{ profile.firstname?.charAt(0) ?? profile.username?.charAt(0) ?? '?' }}
                    </div>
                }
            </div>

            <!-- Name -->
            <div class="mt-6 text-xl font-semibold">
                {{ profile.firstname }} {{ profile.lastname }}
            </div>
            <div class="text-secondary mt-1">{{ profile.email }}</div>
            @if (profile.role) {
                <div class="mt-1 rounded bg-primary-50 px-3 py-1 text-sm font-medium text-primary dark:bg-primary-900 dark:text-primary-200">
                    {{ profile.role }}
                </div>
            }

            <div class="mt-6">
                <button mat-stroked-button (click)="drawer.close()">Close</button>
            </div>
        </div>
    }
</div>
