<div class="p-5">
    <div class="flex items-center justify-between mb-4">
        <div class="text-lg font-bold">Επεξεργασία εισιτηρίου</div>
        <button mat-icon-button type="button" (click)="close()">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <form class="space-y-4" [formGroup]="form">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <mat-form-field class="w-full">
                <mat-label>Ονομα</mat-label>
                <input matInput formControlName="firstname" />
            </mat-form-field>


            <mat-form-field class="w-full">
                <mat-label>Επώνυμο</mat-label>
                <input matInput formControlName="lastname" />
            </mat-form-field>
        </div>

        <!-- ✅ Seat details -->
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
            <mat-form-field class="w-full">
                <mat-label>Θύρα</mat-label>
                <input matInput type="number" formControlName="gate" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Τμήμα</mat-label>
                <input matInput formControlName="section" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Σειρά</mat-label>
                <input matInput formControlName="row" />
            </mat-form-field>

            <mat-form-field class="w-full">
                <mat-label>Θέση</mat-label>
                <input matInput formControlName="seat" />
            </mat-form-field>
        </div>

        <div class="flex justify-end gap-2 pt-3 border-t">
            <button mat-button type="button" (click)="close()">Ακύρωση</button>
            <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="form.invalid">
                Αποθήκευση
            </button>
        </div>
    </form>
</div>
