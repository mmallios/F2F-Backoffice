<div class="p-5">
    <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-red-50 text-red-600 grid place-items-center">
            <mat-icon>warning</mat-icon>
        </div>
        <div class="min-w-0">
            <div class="text-lg font-bold">{{ data.title }}</div>
            <div class="text-secondary text-sm mt-1">{{ data.message }}</div>
        </div>
    </div>

    <div class="flex justify-end gap-2 pt-5">
        <button mat-button type="button" (click)="cancel()">
            {{ data.cancelText || 'Ακύρωση' }}
        </button>
        <button mat-flat-button color="warn" type="button" (click)="confirm()">
            {{ data.confirmText || 'Διαγραφή' }}
        </button>
    </div>
</div>
